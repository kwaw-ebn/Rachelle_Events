<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Rachelle Events</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/your-fontawesome-kit.js" crossorigin="anonymous"></script>
</head>
<body>

    <nav class="navbar sticky">
        <div class="container nav-container">
            <a href="index.html" class="logo">RACHELLE<span>EVENTS</span></a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="blog.html">Blog</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </div>
    </nav>

    <section class="contact-section section-padding">
        <div class="container">
            <div class="contact-grid">
                
                <div class="contact-info reveal">
                    <h2>Get In Touch</h2>
                    <p>Ready to bring your vision to life? Contact our team in Accra today.</p>
                    
                    <div class="info-item" style="margin: 20px 0;">
                        <i class="fas fa-phone-alt" style="color: var(--gold); margin-right: 10px;"></i>
                        <strong>Phone:</strong> 0599635186
                    </div>
                    
                    <div class="info-item" style="margin-bottom: 30px;">
                        <a href="https://wa.me/233599635186" class="btn btn-gold" style="margin-left: 0;">
                            <i class="fab fa-whatsapp"></i> Chat on WhatsApp
                        </a>
                    </div>

                    <div class="map-container reveal" style="border-radius: 15px; overflow: hidden; box-shadow: var(--shadow); line-height: 0;">
                        <iframe 
                            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d127066.25365111956!2d-0.2647781745486518!3d5.591208976451648!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0xfdf9084b2b7a773%3A0xbed14ed8650e2dd3!2sAccra%2C%20Ghana!5e0!3m2!1sen!2sus!4v1700000000000!5m2!1sen!2sus" 
                            width="100%" 
                            height="350" 
                            style="border:0;" 
                            allowfullscreen="" 
                            loading="lazy" 
                            referrerpolicy="no-referrer-when-downgrade">
                        </iframe>
                    </div>
                </div>

                <div class="contact-form-container reveal">
                    <form id="enquiryForm" class="contact-form" style="background: var(--white); padding: 40px; border-radius: 15px; box-shadow: var(--shadow);">
                        <h3 style="margin-bottom: 25px; color: var(--purple);">Send an Enquiry</h3>
                        
                        <div class="form-group">
                            <label>Full Name</label>
                            <input type="text" id="name" placeholder="Enter your name" required>
                        </div>
                        
                        <div class="form-group">
                            <label>Email Address</label>
                            <input type="email" id="email" placeholder="email@example.com" required>
                        </div>
                        
                        <div class="form-group">
                            <label>Event Type</label>
                            <select id="event-type">
                                <option value="wedding">Wedding</option>
                                <option value="corporate">Corporate Event</option>
                                <option value="private">Private Party</option>
                                <option value="decor">Luxury Decor Setup</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label>Message</label>
                            <textarea id="message" rows="5" placeholder="Tell us about your event..." required></textarea>
                        </div>
                        
                        <button type="submit" class="btn btn-gold" style="width: 100%; margin: 10px 0 0 0;">Send Message</button>
                    </form>
                </div>

            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container footer-bottom">
            <p>&copy; 2024 Rachelle Events. All Rights Reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
